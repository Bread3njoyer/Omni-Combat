<!DOCTYPE html>

<html>
  <head>
    <!-- Most of this was pulled from the "html-5 boilerplate" extension -->
    <meta charset="utf-8">
    <link rel="icon" href="../Omnitech_favicon.ico" />
    <title>Omni-Combat - Forest</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/forestStyles.css">
    <link rel="stylesheet" href="../styles/tokenStyles.css">
  </head>
  <body>
    <div class="game-container">
      <h1>Forest</h1>
      <div class="game-window">
        <div class="grid-container"> 
          <!-- This is where the grid will be generated -->
        </div>
        <div class="controls">
          <button id="moveBtn">Move</button>
          <button id="attackBtn">Attack</button>
          <button id="endTurnBtn">End Turn</button>
          <p id="info-text" class="hidden"></p>
          <button id="backBtn" class ="hidden">Back</button>
        </div>
      </div>
    </div>
    <footer>
      <p>Map by 2-Minute Tabletop </p>
    </footer>
    <script src="../scripts/forestScripts.js" defer></script>
    <script src="../scripts/gridScripts.js" defer></script>
  </body>
</html>
