<!DOCTYPE html>
<html>
  <head>
    <!-- Most of this was pulled form the "html-5 boilerplate" extension -->
    <meta charset="utf-8">
    <link rel="icon" href="./src/Omnitech_favicon.ico" />
    <title>Omni-Combat</title>
    <meta name="description" content="A turn-based combat game where players can choose from three different character classes, battle maps, and difficulties. The game boasts several enemy types, each trying to overcome the player.">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./src/styles/styles.css">
  </head>
  <body>
    <div class="container">
      <div class="heading">
        <h1>Omni-Combat</h1>
      </div>
        <br>
        
      <div class="selecter">
        <p>Choose your character:   </p>
        <form class="character-select" id="character-select">
          <!-- This is the first choice container, this is for the character selection -->
          <!-- I'm not sure the div class="character-card" is necessary for each of the inputs and labels-->
          <div class="options-container">
            <div class="character-card">
              <input type="radio" name="character" id="wizard_icon" value="wizard">
              <label for="wizard_icon"><img src="./src/assets/Fighter.png" alt="Wizard Icon">Wizard</label>
            </div>
            <div class="character-card">
              <input type="radio" name="character" id="fighter_icon" value="fighter">
              <label for="fighter_icon"><img src="./src/assets/Fighter.png" alt="Fighter Icon">Fighter</label> 
            </div>
            <div class="character-card">
              <input type="radio" name="character" id="ranger_icon" value="ranger">
              <label for="ranger_icon"><img src="./src/assets/Fighter.png" alt="Ranger Icon">Ranger</label>  
            </div>
          </div>
        </form>
      </div>
      <!-- This will be the next choice container, this will be for map selection -->
      <div class="selecter">
      <p>Choose your map:   </p>
      <form class="map-select" id="map-select">
        <div class = "options-container">
          <div class="map-card">
            <input type="radio" name="map" id="forest_icon" value="forest">
            <label for="forest_icon"><img src="./src/assets/Forest_icon.png" alt="Forest Icon">Forest</label>
          </div>
          <div class="map-card">
            <input type="radio" name="map" id="city_icon" value="city">
            <label for="city_icon"><img src="./src/assets/Forest_icon.png" alt="City Icon">City</label>
          </div>
          <div class="map-card">
            <input type="radio" name="map" id="cave_icon" value="cave">
            <label for="cave_icon"><img src="./src/assets/Forest_icon.png" alt="Cave Icon">Cave</label>
          </div>
        </div>
      </form>
      <!-- This will be the final choice container, this will be for difficulty selection -->
      <div class="selecter">
      <p>Choose your difficulty:   </p>
      <form class="difficulty-select" id="difficulty-select">
        <div class = "options-container">
          <div class="difficulty-card">
            <input type="radio" name="difficulty" id="loot_farm_icon" value="loot_farm">
            <label for="loot_farm_icon"><img src="./src/assets/Forest_icon.png" alt="Loot Farm Icon">Loot Farm</label>
          </div>
          <div class="difficulty-card">
            <input type="radio" name="difficulty" id="dungeon_icon" value="dungeon">
            <label for="dungeon_icon"><img src="./src/assets/Forest_icon.png" alt="Dungeon Icon">Dungeon</label>
          </div>
          <div class="difficulty-card">
            <input type="radio" name="difficulty" id="tpk_icon" value="tpk">
            <label for="tpk_icon"><img src="./src/assets/Forest_icon.png" alt="TPK Icon">TPK 💀</label>
          </div>
        </div>
      </form>
    </div>
    <button class="start-button" id="start-button">Start Game</button>
    <script src="./src/scripts/scripts.js" defer></script>
  </body>
</html>
